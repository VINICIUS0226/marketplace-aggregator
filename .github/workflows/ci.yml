name: CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20.19'
      - run: npm ci
      - name: Build backend
        run: npm run build
      - name: Run backend tests with coverage
        run: npm test -- --coverage
      - name: Upload backend coverage
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage

      - name: Upload backend coverage to Coveralls
        uses: coverallsapp/github-action@v2
        with:
          file: ./backend/coverage/lcov.info
          flag-name: backend
          parallel: true

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20.19'
      - run: npm ci
      - name: Lint frontend
        run: npm run lint
      - name: Install backend dependencies for E2E
        run: cd ../backend && npm ci
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Run frontend tests with coverage
        run: npm test -- --coverage
      - name: Run frontend E2E tests
        run: npm run test:e2e -- --reporter=github
      - name: Upload Playwright failure artifacts
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-failure-artifacts
          path: |
            frontend/test-results
            frontend/playwright-report
          if-no-files-found: ignore
      - name: Upload frontend coverage
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage

      - name: Upload frontend coverage to Coveralls
        uses: coverallsapp/github-action@v2
        with:
          file: ./frontend/coverage/lcov.info
          flag-name: frontend
          parallel: true

      - run: npm run build

  coverage:
    needs:
      - backend
      - frontend
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      - name: Finish Coveralls coverage aggregation
        uses: coverallsapp/github-action@v2
        with:
          parallel-finished: true
